services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: cubo_ai_studio
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "127.0.0.1:5434:5432"
    volumes:
      - postgres_staging_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cubo_ai_studio"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:6380:6379"
    volumes:
      - redis_staging_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    image: node:22-alpine
    restart: unless-stopped
    working_dir: /workspace/apps/api
    env_file:
      - ./.env.staging
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/cubo_ai_studio?schema=public
      REDIS_URL: redis://redis:6379
    volumes:
      - ./:/workspace
    command: >
      sh -lc "npm install &&
      npx prisma generate --schema prisma/schema.prisma &&
      npm run build &&
      node dist/main.js"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "127.0.0.1:3001:3001"

  frontend:
    image: node:22-alpine
    restart: unless-stopped
    working_dir: /workspace
    env_file:
      - ./.env.staging
    volumes:
      - ./:/workspace
    command: >
      sh -lc "npm install &&
      NODE_ENV=production npm run build &&
      PORT=4173 node .output/server/index.mjs"
    depends_on:
      - api
    ports:
      - "127.0.0.1:4173:4173"

  auth-proxy:
    build:
      context: ./infra/auth-proxy
    restart: unless-stopped
    env_file:
      - ./.env.staging
    environment:
      PORT: 8080
      API_TARGET: http://api:3001
      FRONTEND_TARGET: http://frontend:4173
    depends_on:
      - api
      - frontend

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - auth-proxy
      - api

volumes:
  postgres_staging_data:
  redis_staging_data:
  caddy_data:
  caddy_config:
