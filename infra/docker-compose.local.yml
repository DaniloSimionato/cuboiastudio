services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: cubo-ai-studio-postgres
    environment:
      POSTGRES_DB: cubo_ai_studio
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - cubo_ai_studio_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cubo_ai_studio"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: cubo-ai-studio-redis
    ports:
      - "6379:6379"
    volumes:
      - cubo_ai_studio_redis_data:/data
    command: ["redis-server", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  cubo_ai_studio_postgres_data:
  cubo_ai_studio_redis_data:
